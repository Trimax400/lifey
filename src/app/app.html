<div 
  class="flex flex-col h-screen bg-slate-50 text-slate-900 overflow-hidden relative"
  (touchstart)="onTouchStart($event)"
  (touchend)="onTouchEnd($event)"
>
  
  <div class="flex flex-1 overflow-hidden relative w-full">

  @if (isMobileMenuOpen()) {
    <div 
      class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 md:hidden transition-opacity duration-300"
      (click)="closeMobileMenu()">
    </div>
  }

  <app-sidebar 
    class="fixed inset-y-0 left-0 w-64 bg-white transform transition-transform duration-300 ease-in-out z-50 md:relative md:translate-x-0 flex-shrink-0 -translate-x-full"
    [class.-translate-x-full]="!isMobileMenuOpen()"
    [class.translate-x-0]="isMobileMenuOpen()"
    (click)="closeMobileMenu()" 
  ></app-sidebar>
  <div class="flex-1 flex flex-col h-full overflow-y-auto w-full relative">
    
    <div class="md:hidden bg-white/70 backdrop-blur-md border-b border-slate-200 p-4 sticky top-0 z-30 flex justify-between items-center">
      <a [routerLink]="['/']" class="font-bold text-xl tracking-tighter font-mono italic">
        Li<span class="text-emerald-600">fey</span>
      </a>
      <button (click)="isMobileMenuOpen.set(true)" class="text-slate-500 hover:text-emerald-600 p-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
    </div>

    <main class="flex-grow w-full px-4 sm:px-6 py-8">
      <router-outlet></router-outlet>
    </main>
  </div>
  </div>

  <app-footer class="block w-full shrink-0 z-20 relative"></app-footer>

</div>
