<div 
  class="flex flex-col h-screen bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 overflow-hidden relative"
  (touchstart)="onTouchStart($event)"
  (touchend)="onTouchEnd($event)"
>
  @if (!showSidebar()) {
    <div class="fixed top-4 right-4 z-50 flex items-center gap-4 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md p-2 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
      <app-language-switcher></app-language-switcher>
      <div class="w-px h-4 bg-slate-200 dark:bg-slate-800"></div>
      <app-theme-switcher></app-theme-switcher>
    </div>
  }

  <div class="flex flex-1 overflow-hidden relative w-full">

  @if (showSidebar() && isMobileMenuOpen()) {
    <div 
      class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 md:hidden transition-opacity duration-300"
      (click)="closeMobileMenu()">
    </div>
  }

  @if (showSidebar()) {
    <app-sidebar 
      class="fixed inset-y-0 left-0 w-64 bg-white dark:bg-slate-900 transform transition-transform duration-300 ease-in-out z-50 md:relative md:translate-x-0 flex-shrink-0 -translate-x-full"
      [class.-translate-x-full]="!isMobileMenuOpen()"
      [class.translate-x-0]="isMobileMenuOpen()"
      (click)="closeMobileMenu()" 
    ></app-sidebar>
  }
  <div class="flex-1 flex flex-col h-full overflow-y-auto w-full relative">
    
    @if (showSidebar()) {
      <div class="md:hidden bg-white/70 dark:bg-slate-900/70 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 p-4 sticky top-0 z-30 flex justify-between items-center">
        <a [routerLink]="['/']" class="font-bold text-xl tracking-tighter font-mono italic dark:text-white">
          Li<span class="text-emerald-600">fey</span>
        </a>
        <button (click)="isMobileMenuOpen.set(true)" aria-label="Open menu" i18n-aria-label="@@app.openMenu" class="text-slate-500 dark:text-slate-400 hover:text-emerald-600 p-1 cursor-pointer">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
      </div>
    }

    <main class="flex-grow w-full px-4 sm:px-6 py-8">
      <router-outlet></router-outlet>
    </main>
  </div>
  </div>

  <app-footer class="block w-full shrink-0 z-20 relative"></app-footer>

</div>
