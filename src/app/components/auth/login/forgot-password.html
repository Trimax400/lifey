<div class=" flex items-center justify-center bg-background dark:bg-slate-950 p-4">
    <div class="max-w-md w-full bg-white/70 dark:bg-slate-900/70 backdrop-blur-md p-8 rounded-xl shadow-md border dark:border-slate-800">
        <div class="text-center mb-8">
            <h2 class="mt-6 text-center text-3xl font-black text-slate-800 dark:text-white tracking-tight">
                Li<span class="text-emerald-600">fey</span>
            </h2>
            <h3 class="text-xl font-semibold dark:text-white mb-2" i18n="@@forgotPassword.title">Forgot password ?</h3>
            <p class="text-sm text-gray-600 dark:text-slate-400" i18n="@@forgotPassword.description">
                Put your email address and we'll send you a link to reset your password.
            </p>
        </div>

        <form (ngSubmit)="resetPassword()" class="space-y-5">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 dark:text-slate-300 mb-1" i18n="@@forgotPassword.emailLabel">Email address</label>
                <input type="email" id="email" name="email" [(ngModel)]="email" required email #emailCtrl="ngModel"
                    class="w-full px-4 py-2 border dark:border-slate-700 rounded-lg dark:bg-slate-800 dark:text-white focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all"
                    i18n-placeholder="@@forgotPassword.emailPlaceholder" placeholder="john.doe@example.com">
            </div>

            @if (errorMessage()) {
            <div class="text-red-600 dark:text-red-400 text-sm p-3 bg-red-50 dark:bg-red-900/20 border border-red-100 dark:border-red-800 rounded-lg">
                {{ errorMessage() }}
            </div>
            }

            @if (message()) {
            <div class="text-emerald-700 dark:text-emerald-400 text-sm p-3 bg-emerald-50 dark:bg-emerald-900/20 border border-emerald-100 dark:border-emerald-800 rounded-lg">
                {{ message() }}
            </div>
            }

            <button type="submit" [disabled]="isLoading() || emailCtrl.invalid"
                class="w-full bg-emerald-600 text-white font-mono uppercase tracking-widest text-xs px-5 py-3 rounded-lg shadow-sm hover:bg-emerald-500 transition-all duration-200 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                @if (isLoading()) {
                <span i18n="@@forgotPassword.btnEmailSent">Email sent</span>
                } @else {
                <span i18n="@@forgotPassword.btnReset">Reset password</span>
                }
            </button>
        </form>

        <div class="mt-6 text-center">
            <a routerLink="/login" class="text-sm text-gray-500 dark:text-slate-400 hover:text-emerald-600 transition-colors" i18n="@@forgotPassword.backToLogin">
                Back to the login page
            </a>
        </div>
    </div>
</div>
