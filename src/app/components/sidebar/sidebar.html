<aside class="w-full h-full bg-white border-r border-slate-200 flex flex-col z-50">
  
  <div class="p-6">
    <a [routerLink]="['/']" class="font-bold text-2xl tracking-tighter font-mono italic">
      Li<span class="text-emerald-600">fey</span>
    </a>
  </div>

  <nav class="flex-1 overflow-y-auto px-4 py-2 space-y-2">
    @for (link of navLinks; track link.href) {
      <a [routerLink]="link.href"
         routerLinkActive="bg-emerald-50 text-emerald-600 font-bold"
         [routerLinkActiveOptions]="{exact: true}"
         class="block px-4 py-3 text-xs font-mono uppercase tracking-widest text-slate-500 hover:bg-slate-50 hover:text-emerald-600 rounded-xl transition-all duration-200">
        {{ link.label }}
      </a>
    }
  </nav>

  <div class="p-4 border-t border-slate-100">
    <button (click)="logout()" class="w-full text-xs font-mono uppercase tracking-widest bg-emerald-600 text-white px-5 py-3 rounded-xl shadow-sm hover:bg-emerald-500 hover:shadow transition-all duration-200 active:scale-95 cursor-pointer">
      Disconnect
    </button>
  </div>

</aside>
