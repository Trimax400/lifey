<section class="mb-8 text-center md:text-left">
    <h1 class="text-4xl font-black text-slate-800 dark:text-white tracking-tight" i18n="@@profile.title">My Profile</h1>
    <p class="mt-2 text-slate-500 dark:text-slate-400 font-medium" i18n="@@profile.subtitle">Manage your account information and security.</p>
</section>

@if (isLoading()) {
<div class="flex justify-center items-center py-12 mb-6">
  <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-emerald-600"></div>
</div>
} @else {
<div class="bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 mb-6 w-full flex flex-col">
  
  <div class="p-6 md:p-8">
    <h3 class="text-xl font-bold text-slate-800 dark:text-white mb-6" i18n="@@profile.accountInfo">Account Information</h3>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div>
        <label class="block text-sm font-medium text-slate-500 dark:text-slate-400 mb-1" i18n="@@profile.emailLabel">Email Address</label>
        <div class="p-3 bg-slate-50 dark:bg-slate-800 border border-slate-100 dark:border-slate-700 rounded-xl text-slate-700 dark:text-slate-200 font-medium truncate">
          {{ userEmail() }}
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-500 dark:text-slate-400 mb-1" i18n="@@profile.createdAtLabel">Member since</label>
        <div class="p-3 bg-slate-50 dark:bg-slate-800 border border-slate-100 dark:border-slate-700 rounded-xl text-slate-700 dark:text-slate-200 font-medium">
          {{ createdAt() | date:'longDate' }}
        </div>
      </div>
    </div>
  </div>


  <hr class="border-t-1 border-slate-200 dark:border-slate-800 w-[95%] mx-auto">

  <div class="p-6 md:p-8">
      <h3 class="text-xl font-bold text-slate-800 dark:text-white mb-6" i18n="@@profile.security">Security</h3>
    
    @if (successMessage()) {
      <div class="mb-6 p-4 bg-emerald-50 dark:bg-emerald-900/20 text-emerald-700 dark:text-emerald-400 text-sm font-medium rounded-xl border border-emerald-100 dark:border-emerald-800">
        {{ successMessage() }}
      </div>
    }
    @if (errorMessage()) {
      <div class="mb-6 p-4 bg-red-50 dark:bg-red-900/20 text-red-700 dark:text-red-400 text-sm font-medium rounded-xl border border-red-100 dark:border-red-800">
        {{ errorMessage() }}
      </div>
    }

    <form (ngSubmit)="onUpdatePassword()" class="max-w-md">
      <div class="mb-5">
          <label for="newPassword" class="block text-sm font-medium text-slate-500 dark:text-slate-400 mb-1" i18n="@@profile.newPasswordLabel">New Password</label>
        <input type="password" id="newPassword" name="newPassword" [ngModel]="newPassword()" (ngModelChange)="newPassword.set($event)" required minlength="6"
            class="w-full appearance-none bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-sm font-medium text-slate-700 dark:text-white rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 py-3 px-4 outline-none transition-colors" i18n-placeholder="@@profile.newPasswordPlaceholder" placeholder="At least 6 characters">
      </div>

      <div class="mb-6">
          <label for="confirmPassword" class="block text-sm font-medium text-slate-500 dark:text-slate-400 mb-1" i18n="@@profile.confirmPasswordLabel">Confirm Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" [ngModel]="confirmPassword()" (ngModelChange)="confirmPassword.set($event)" required minlength="6"
            class="w-full appearance-none bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-sm font-medium text-slate-700 dark:text-white rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 py-3 px-4 outline-none transition-colors" i18n-placeholder="@@profile.confirmPasswordPlaceholder" placeholder="Enter it again">
      </div>

        <button type="submit" [disabled]="isUpdating()" class="w-full md:w-auto py-3 px-6 bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-bold rounded-xl shadow-sm transition-colors focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2 outline-none disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer">
          @if (isUpdating()) {
          <span i18n="@@profile.btnUpdating">Updating...</span>
          } @else {
          <span i18n="@@profile.btnSubmit">Update password</span>
          }
        </button>
    </form>
  </div>
</div>
}
