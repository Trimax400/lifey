<div class="flex justify-between items-center mb-4">
  <h3 class="text-lg font-bold text-slate-800">{{ title }}</h3>
  <div class="flex gap-4 text-xs font-medium">
    <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-emerald-500"></span> <ng-container i18n="@@lineChart.incomes">Incomes</ng-container></div>
    <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-red-500"></span> <ng-container i18n="@@lineChart.expenses">Expenses</ng-container></div>
    <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-blue-500"></span> <ng-container i18n="@@lineChart.balance">Balance</ng-container></div>
  </div>
</div>

<div class="relative w-full h-48 mt-4 mb-6">
  @if (data.length > 1) {
    <svg viewBox="0 0 600 120" preserveAspectRatio="none" class="w-full h-full overflow-visible">
      <line x1="0" y1="0" x2="600" y2="0" stroke="#f1f5f9" stroke-width="1" />
      <line x1="0" y1="60" x2="600" y2="60" stroke="#f1f5f9" stroke-width="1" />
      <line x1="0" y1="120" x2="600" y2="120" stroke="#f1f5f9" stroke-width="1" />
      
      <path [attr.d]="paths.income" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      <path [attr.d]="paths.expenses" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      <path [attr.d]="paths.balance" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
    <div class="relative w-full h-6 mt-2">
      @for (item of data; track item.label; let i = $index) {
        <span class="absolute text-xs font-bold text-slate-400 -translate-x-1/2" [style.left]="(i * 100 / (data.length - 1 || 1)) + '%'">{{ item.label }}</span>
      }
    </div>
  } @else {
    <div class="flex items-center justify-center h-full text-slate-500 font-medium" i18n="@@lineChart.noData">Not enough data for history chart.</div>
  }
</div>
