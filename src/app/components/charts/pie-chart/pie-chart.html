<div class="chart-wrapper w-full h-full relative">
  <div #chartContainer 
       class="w-full h-full flex justify-center items-center overflow-hidden [&>*]:max-w-full [&>*]:max-h-full"
       [class.hidden]="!data || data.length === 0"></div>
       
  @if (!data || data.length === 0) {
    <div class="absolute inset-0 flex justify-center items-center text-slate-500 dark:text-slate-400 font-medium">
      {{ emptyMessage }}
    </div>
  }
</div>
